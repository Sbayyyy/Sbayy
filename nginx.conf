events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=5r/s;

    upstream sbay_backend {
        server 127.0.0.1:5000;
    }

    upstream sbay_frontend {
        server 127.0.0.1:3000;
    }

    server {
        listen 80;
        server_name syrian-bay.com www.syrian-bay.com api.syrian-bay.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name syrian-bay.com www.syrian-bay.com;

        ssl_certificate /etc/letsencrypt/live/syrian-bay.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/syrian-bay.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://sbay_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

    }

    server {
        listen 443 ssl http2;
        server_name api.syrian-bay.com;

        ssl_certificate /etc/letsencrypt/live/api.syrian-bay.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.syrian-bay.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        client_max_body_size 10m;

        location /uploads/ {
            alias /home/YOUR_USER/apps/sbay/Sbayy/uploads/;
            limit_req zone=uploads burst=10 nodelay;
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
        }

        location /assets/ {
            alias /var/sbay/assets/;
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
        }

        location /api/ {
            proxy_pass http://sbay_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            limit_req zone=api burst=20 nodelay;
        }

        location /health/ {
            proxy_pass http://sbay_backend/health/;
            access_log off;
        }

        location / {
            proxy_pass http://sbay_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
