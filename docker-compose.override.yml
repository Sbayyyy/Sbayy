services:
  backend:
    build:
      context: ./Backend/SBay.Backend
      dockerfile: Dockerfile
      target: build
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
    volumes:
      - ./Backend/SBay.Backend:/app
      - api-nuget:/root/.nuget/packages
    working_dir: /app
    command: ["dotnet", "watch", "run", "--no-launch-profile", "--urls", "http://+:8080"]

  web:
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_API_PROXY_TARGET: http://backend:8080
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@syrian-bay.com}
      RUNTIME_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@syrian-bay.com}
      NEXT_PUBLIC_LOGO_URL: ${NEXT_PUBLIC_LOGO_URL:-/assets/sbaylogo.png}
      RUNTIME_LOGO_URL: ${NEXT_PUBLIC_LOGO_URL:-/assets/sbaylogo.png}
    volumes:
      - ./Frontend:/app
      - frontend-node-modules:/app/node_modules
      - web-node-modules:/app/web/node_modules
      - web-shared-node-modules:/app/packages/shared/node_modules
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev --workspace=web -- -p 3000 -H 0.0.0.0"]

volumes:
  api-nuget:
  frontend-node-modules:
  web-node-modules:
  web-shared-node-modules:
