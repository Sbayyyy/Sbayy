# Production Docker Compose for IONOS VPS

name: sbay

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sbay
      POSTGRES_USER: sbay
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbay -d sbay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./Backend/SBay.Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER:-SBay}
      Jwt__Audience: ${JWT_AUDIENCE:-SBayClients}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__ExpMinutes: ${JWT_EXP_MINUTES:-60}
      Redis__Host: redis
      Redis__Port: 6379
      App__PublicBaseUrl: ${APP_PUBLIC_BASE_URL:-https://api.syrian-bay.com}
      Storage__Provider: local
      Storage__Local__Path: ${STORAGE_LOCAL_PATH:-/app/uploads}
      Storage__Local__PublicBaseUrl: ${STORAGE_LOCAL_PUBLIC_BASE_URL:-https://api.syrian-bay.com}
      Cors__AllowAnyOrigin: "false"
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-https://syrian-bay.com}
      Cors__AllowedOrigins__1: ${FRONTEND_WWW_URL:-https://www.syrian-bay.com}
      RateLimits__TrustForwardedFor: "true"
      Payments__Provider: ${PAYMENTS_PROVIDER:-mock}
      Payments__Mock__WebhookSecret: ${PAYMENTS_MOCK_WEBHOOK_SECRET}
      Monetization__Currency: ${MONETIZATION_CURRENCY:-SYP}
      Monetization__CommissionPercent: ${MONETIZATION_COMMISSION_PERCENT:-5}
    ports:
      - "127.0.0.1:${API_HOST_PORT:-5000}:8080"
    volumes:
      - ${UPLOADS_HOST_PATH:-./uploads}:${STORAGE_LOCAL_PATH:-/app/uploads}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./Frontend
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.syrian-bay.com}
        NEXT_PUBLIC_API_PROXY_TARGET: ${NEXT_PUBLIC_API_PROXY_TARGET:-http://backend:8080}
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@syrian-bay.com}
        NEXT_PUBLIC_LOGO_URL: ${NEXT_PUBLIC_LOGO_URL:-https://api.syrian-bay.com/assets/sbaylogo.png}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.syrian-bay.com}
      RUNTIME_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.syrian-bay.com}
      NEXT_PUBLIC_API_PROXY_TARGET: ${NEXT_PUBLIC_API_PROXY_TARGET:-http://backend:8080}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@syrian-bay.com}
      RUNTIME_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@syrian-bay.com}
      NEXT_PUBLIC_LOGO_URL: ${NEXT_PUBLIC_LOGO_URL:-https://api.syrian-bay.com/assets/sbaylogo.png}
      RUNTIME_LOGO_URL: ${NEXT_PUBLIC_LOGO_URL:-https://api.syrian-bay.com/assets/sbaylogo.png}
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  redisdata:
