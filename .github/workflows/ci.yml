name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend (.NET 9) ────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/SBay.Backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        working-directory: Backend/SBay.Backend.Tests
        run: dotnet test --no-restore --configuration Release --logger "trx" --results-directory TestResults
        env:
          # Testcontainers needs Docker (available on ubuntu-latest)
          DOTNET_ENVIRONMENT: Testing

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: Backend/SBay.Backend.Tests/TestResults/
          retention-days: 7

  # ─── Frontend (Next.js) ──────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Type-check, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/web/package-lock.json

      - name: Install shared package
        working-directory: Frontend
        run: npm install --prefix web

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test -- --ci --passWithNoTests

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api

  # ─── Docker Build Check ─────────────────────────────────────────────
  docker:
    name: Docker — Verify images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Backend/SBay.Backend/Dockerfile Backend/SBay.Backend

      - name: Build frontend image
        run: docker build -f Frontend/web/Dockerfile --build-arg NEXT_PUBLIC_API_URL=/api Frontend
