name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore sbay.sln

      - name: Build
        run: dotnet build sbay.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test sbay.sln --configuration Release --no-build

  frontend:
    name: Frontend build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run type-check --workspace=web

      - name: Test
        run: npm test --workspace=web -- --runInBand

      - name: Build
        run: npm run build --workspace=web

  docker:
    name: Docker build and config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose -f docker-compose.yml build
